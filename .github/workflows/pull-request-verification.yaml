name: Pull Request Verification
defaults:
  run:
    # 明示的に shell を指定すると "pipefail" が暗黙的に設定され安全性が向上する
    shell: bash
on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # 新しい変更を検知した際、すでに実行中のジョブはキャンセルする（最新のコードベースだけ検証したいため）
  cancel-in-progress: true
jobs:
  # 変更されたパスを検知し、後続ジョブの起動可否を出力する
  changes:
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # backend / frontend は生成 gRPC コードに依存するので grpc/** でも起動する
          filters: |
            proto:
              - 'grpc/**'
            backend:
              - 'backend/**'
              - 'grpc/**'
            frontend:
              - 'frontend/**'
              - 'grpc/**'

  # proto の lint
  proto-lint:
    needs: changes
    if: ${{ needs.changes.outputs.proto == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: "checkout"
        uses: actions/checkout@v6

      - name: "setup buf"
        uses: bufbuild/buf-setup-action@v1
        with:
          # aqua.yaml の pin に合わせる
          version: "1.52.1"
          # token を渡さないと GitHub Releases からの buf DL が未認証扱いで rate limit に当たる
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: "buf lint"
        working-directory: ./grpc
        run: buf lint

  # backend: ktlint + build + test（Testcontainers）+ カバレッジを PR にコメント
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    # カバレッジを PR にコメントするため pull-requests: write が必要（他は read で十分）
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: "checkout"
        uses: actions/checkout@v6

      - name: "setup buf"
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.52.1"
          # token を渡さないと GitHub Releases からの buf DL が未認証扱いで rate limit に当たる
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # gRPC 生成コード（jp.momiji.grpc.*）が compileKotlin の前提なので先に生成する
      - name: "gRPC コード生成"
        working-directory: ./grpc
        run: buf generate

      - name: "setup java"
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "25"

      - name: "setup gradle"
        uses: gradle/actions/setup-gradle@v6

      - name: "gradlew に実行権限を付与"
        run: chmod +x ./backend/gradlew

      # build = check(ktlint + test) + assemble。 Testcontainers は ubuntu-latest の Docker を使う
      - name: "ktlint + build + test"
        working-directory: ./backend
        run: ./gradlew build

      # build で実行済みのテスト結果を使って Kover の XML レポートを生成する
      - name: "カバレッジ XML 生成（Kover）"
        working-directory: ./backend
        run: ./gradlew koverXmlReport

      # 生成した XML を読んで PR にカバレッジをコメントする
      - name: "PR にカバレッジをコメント"
        uses: mi-kas/kover-report@v2
        # 投稿失敗（fork PR で token が read-only 等）でビルドを赤にしないよう握りつぶす
        continue-on-error: true
        with:
          path: ./backend/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: バックエンドのカバレッジ
          update-comment: true

  # frontend: 型チェック + lint
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: "checkout"
        uses: actions/checkout@v6

      - name: "setup buf"
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.52.1"
          # token を渡さないと GitHub Releases からの buf DL が未認証扱いで rate limit に当たる
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # frontend は ./frontend/grpc/gen の生成 TS を import するので先に生成する
      - name: "gRPC コード生成"
        working-directory: ./grpc
        run: buf generate

      - name: "setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          # aqua.yaml の pin に合わせる
          version: "10"

      - name: "setup node"
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ./frontend/pnpm-lock.yaml

      - name: "依存インストール"
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: "型チェック (tsc)"
        working-directory: ./frontend
        run: pnpm exec tsc --noEmit

      - name: "lint"
        working-directory: ./frontend
        run: pnpm lint

  # gate: ブランチプロテクション・マージの条件における、必須チェックはこの 1 本に集約する
  # 途中で必須チェック項目が出現・削除・りリネームされてもgithubの設定を変更しなくても良いのが嬉しいポイント
  verify:
    needs: [proto-lint, backend, frontend]
    # 前段が skip でも必ず走らせる（if が無いと前段 skip 時に verify 自体も skip して無意味になる）
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "必須ジョブの結果を判定"
        # failure / cancelled があれば落とす。skipped（path 対象外）/ success は許容。
        env:
          RESULTS: "${{ needs.proto-lint.result }} ${{ needs.backend.result }} ${{ needs.frontend.result }}"
        run: |
          echo "results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::必須ジョブが $r で終了しました"
              exit 1
            fi
          done
          echo "すべての必須ジョブが success または skipped"
