name: Sync labels

# .github/labels.yml を唯一の定義として、リポジトリのラベルへ反映する。
# 手動の gh label create は不要。ラベルを足したいときは labels.yml を編集して push。
on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: false # 定義に無いラベルは削除（labels.yml を唯一の正にして完全同期）
