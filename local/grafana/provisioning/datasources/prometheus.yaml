apiVersion: 1 # Grafana provisioning API のバージョン

datasources:
  - name: Prometheus # Grafana UI 上の表示名
    uid: prometheus # dashboard 等から参照する固定 ID (省くと毎回ランダム生成されて参照が壊れる)
    type: prometheus # データソース種別
    url: http://prometheus:9090 # docker network 内の Prometheus HTTP API
    isDefault: true # Grafana のデフォルトデータソースにする (Explore 開いた時に最初に選ばれる)
