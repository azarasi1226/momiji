name: momiji

services:
  axon-server:
    image: axoniq/axonserver:2026.0.1-nonroot
    environment:
      # DCB対応のContextを手動でしなくてもよくなる
      axoniq.axonserver.standalone-dcb: true
      axoniq_axonserver_hostname: axon-server
      axoniq_axonserver_devmode_enabled: true
    volumes:
      - momiji-axonserver-data:/axonserver/data
      - momiji-axonserver-events:/axonserver/events
    ports:
      - 8024:8024
      - 8124:8124
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8024/actuator/health"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: passw0rd
      POSTGRES_DB: momiji
    # 他プロジェクトの postgres と衝突しないようホスト側は 5436 にずらす
    ports:
      - "5436:5432"
    volumes:
      - momiji-postgres-data:/var/lib/postgresql

  keycloak:
    image: keycloak/keycloak:26.6.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/momiji-realm.json:/opt/keycloak/data/import/momiji-realm.json:ro
      - momiji-keycloak-data:/opt/keycloak/data
    ports:
      - "8085:8080"

  mailpit:
    image: axllent/mailpit:v1.30.1
    environment:
      MP_DATABASE: /data/mailpit.db
    volumes:
      - momiji-mailpit-data:/data
    ports:
      - "8025:8025"
      - "1025:1025"

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      # OTLP HTTP receiver を有効化 (POST /api/v1/otlp/v1/metrics でメトリクスを受け取る)
      - "--web.enable-otlp-receiver"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - momiji-prometheus-data:/prometheus
    ports:
      - "19090:9090"

  tempo:
    image: grafana/tempo:2.10.5
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - momiji-tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource はここを叩く)
      - "4318:4318"   # OTLP HTTP receiver

  loki:
    image: grafana/loki:3.7.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - momiji-loki-data:/loki
    ports:
      - "3100:3100"   # HTTP API + OTLP receiver (/otlp/v1/logs)

  grafana:
    image: grafana/grafana:13.0
    environment:
      # ローカル開発時は認証不要で開く (admin 権限)
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - momiji-grafana-data:/var/lib/grafana
    ports:
      # frontend が 3000 を使うので 3001
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  # 画像ストレージ（S3 互換）。 本番 S3 の代わりにローカルで使う。
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # presigned PUT をブラウザ(localhost:3000)から直接叩くため CORS を許可（local は全許可）。
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - momiji-minio-data:/data
    ports:
      - "9000:9000"   # S3 API（presigned URL / 画像配信）
      - "9001:9001"   # 管理コンソール

  # 起動時に bucket を作成し、 匿名 GET（<img> 表示用の公開読み取り）を許可する。
  # ワンショット（実行後 exit する）コンテナは `up --wait` が「待機失敗」と判定して exit 1 になるため、
  # profile で通常の `up` から外し、 taskfile の docker-up が `run --rm` で個別に実行する。
  minio-init:
    profiles: ["init"]
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./minio/init.sh:/init.sh:ro

volumes:
  momiji-postgres-data:
  momiji-axonserver-data:
  momiji-axonserver-events:
  momiji-keycloak-data:
  momiji-mailpit-data:
  momiji-prometheus-data:
  momiji-grafana-data:
  momiji-tempo-data:
  momiji-loki-data:
  momiji-minio-data: