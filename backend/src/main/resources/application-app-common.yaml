server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: ${APPLICATION_NAME:momiji-backend}
  grpc:
    server:
      port: ${GRPC_PORT:9091}
  output:
    ansi:
      # コンソールのレベル色分け等を全環境で有効化。
      enabled: ALWAYS

logging:
  pattern:
    # シンプルなログスタイル。「時刻 / レベル / thread / クラス名(simple) / メッセージ」にする。
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5p) %clr([%15.15t]){faint} %clr(%logger{0}){cyan} %clr(:){faint} %m%n"

momiji:
  oidc:
    issuer-uri: ${JWT_ISSUER_URI}
    # このトークンが「どのクライアント宛か」の検証用。 frontend(BFF) の client id と一致させる。
    # Keycloak は access token の azp、 Cognito は client_id を見る（JwtClientIdValidator）。
    client-id: ${OIDC_CLIENT_ID}
  email-change:
    secret: ${EMAIL_CHANGE_SECRET}
    expiry: PT1H
  mail:
    from: ${MAIL_FROM}

