spring:
  # docker compose の起動は Taskfile 側で制御するため、Spring Bootの自動起動はoffに
  docker-compose-enabled: false
  profiles:
    active: local
    group:
      integration-test:
        - app-common
        # IDP / Mail / JwtDecoder / OidcUserInfoFetcher は @MockkBean で置き換えるため、
        # 本物の bean を作る idp-* / mail-* profile は外す。 これにより Keycloak / MailHogの TestContainer を起動する必要もなくなる。
        - app-integration-test
      local:
        - app-common
        - app-local
        - observability-otlp
        - datastore-postgresql
        - idp-keycloak
        - mail-smtp
        - storage-minio
        - payment-stripe
      test:
        - app-common
        - app-test
        - observability-otlp
        - datastore-postgresql
        - idp-cognito
        - storage-s3
        - payment-stripe
        #- mail-smtp (mail-sendgrid みたいなのを作るべし)
      prod:
        - app-common
        - app-prod
        - observability-otlp
        - datastore-postgresql
        - idp-cognito
        - storage-s3
        - payment-stripe
        #- mail-smtp (mail-sendgrid みたいなのを作るべし)
