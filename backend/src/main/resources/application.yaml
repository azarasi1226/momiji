server:
  port: ${SERVER_PORT:9090}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8085/realms/momiji}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:3336}/${SPRING_DATASOURCE_DATABASE:momiji}?createDatabaseIfNotExist=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:passw0rd}

momiji:
  email-change:
    secret: ${EMAIL_CHANGE_SECRET:this-is-a-dev-secret-change-in-production-32chars!}
    expiry: PT1H

springdoc:
  swagger-ui:
    oauth:
      client-id: momiji-api
      use-pkce-with-authorization-code-grant: true