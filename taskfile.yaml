version: "3"

tasks:
  default:
    silent: true
    desc: 実行可能なすべてのタスクを表示
    cmds:
      - task --list-all

  setup:
    desc: 初回セットアップ（コンテナ起動 → DBマイグレーション → protoコード生成）。clone 後まずこれ
    deps:
      # atlas-migrate-apply は deps:[docker-up] を内包するので、 ここで docker-up は別途並べない（二重起動回避）。
      # buf-generate はコンテナ非依存なので並列実行でよい。
      - atlas-migrate-apply
      - buf-generate

  reset:
    desc: ローカルを破棄して作り直す（volume 削除 → setup）
    # 破棄してから作り直すので deps(並列) でなく cmds(逐次) で順序を保証する。
    cmds:
      - task: docker-clean
      - task: setup

  docker-up:
    desc: コンテナ起動
    cmds:
      - docker compose -f ./local/docker-compose.yaml up -d --wait

  docker-down:
    desc: コンテナ停止（ボリューム/データは残す）
    cmds:
      - docker compose -f ./local/docker-compose.yaml down

  docker-clean:
    desc: ボリューム（永続データ）を削除してまっさらに（DB/イベントストア等が消える）
    cmds:
      - docker compose -f ./local/docker-compose.yaml down -v

  atlas-migrate-diff:
    desc: データベースのマイグレーション差分を生成
    dir: ./backend/database
    cmds:
      - atlas migrate diff --dev-url "docker://mysql/8/dev" --dir "file://migrations" --to "file://schema.mysql.sql"

  atlas-migrate-apply:
    desc: データベースのマイグレーションを適用
    dir: ./backend/database
    deps:
      - docker-up
    cmds:
      - atlas migrate apply --url "mysql://root:passw0rd@localhost:3336/momiji" --dir "file://migrations" --allow-dirty

  buf-lint:
    desc: protoファイルのlintを実行
    dir: ./grpc
    cmds:
      - buf lint

  buf-generate:
    desc: protoファイルからKotlin/TypeScriptコードを生成
    dir: ./grpc
    cmds:
      - buf generate

  docs-lint:
    desc: ドキュメント（/docs 配下）の Markdown と日本語の校正 lint
    dir: ./docs
    cmds:
      - pnpm run lint

  docs-fix:
    desc: ドキュメント（/docs 配下）の Markdown と日本語の校正 fix
    dir: ./docs
    cmds:
      - pnpm run fix