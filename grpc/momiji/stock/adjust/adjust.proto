syntax = "proto3";

package momiji.stock.adjust;

import "momiji/stock/reason.proto";

// 在庫調整（販売以外の理由で在庫を増減する）。 管理者向け操作。
service AdjustStockService {
  rpc AdjustStock(AdjustStockRequest) returns (AdjustStockResponse);
}

message AdjustStockRequest {
  string product_id = 1;
  // 符号付き差分（増加は正・減少は負、 0 不可）。
  int32 quantity = 2;
  momiji.stock.StockAdjustmentReason reason = 3;
}

message AdjustStockResponse {}
