syntax = "proto3";

package momiji.stock.findbyproductid.v1;

// 商品の在庫状況を取得する。
service FindStockByProductIdService {
  rpc FindStockByProductId(FindStockByProductIdRequest) returns (FindStockByProductIdResponse);
}

message FindStockByProductIdRequest {
  string product_id = 1;
}

message FindStockByProductIdResponse {
  // 物理在庫。
  int32 on_hand = 1;
  // 確保済み（オーダー確定待ちの仮押さえ合計）。 予約フロー未実装の現状は常に 0。
  int32 reserved = 2;
  // 販売可能数 = on_hand - reserved。
  int32 available = 3;
}
