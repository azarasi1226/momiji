syntax = "proto3";

package momiji.product.findbyid;

import "google/protobuf/timestamp.proto";
import "momiji/product/status.proto";

service FindProductByIdService {
  rpc FindProductById(FindProductByIdRequest) returns (FindProductByIdResponse);
}

message FindProductByIdRequest {
  string id = 1;
}

message FindProductByIdResponse {
  string id = 1;
  string brand_id = 2;
  string name = 3;
  string description = 4;
  string image_url = 5;
  int32 price = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  momiji.product.ProductStatus status = 9;
}
