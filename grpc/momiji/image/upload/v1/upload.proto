syntax = "proto3";

package momiji.image.upload.v1;

// 画像アップロード用の presigned PUT URL を発行する。 ログイン済み（JWT）前提の管理者操作。
// バイナリ自体は gRPC を通さず、 ブラウザが upload_url に直接 PUT する。
service IssueImageUploadUrlService {
  rpc IssueImageUploadUrl(IssueImageUploadUrlRequest) returns (IssueImageUploadUrlResponse);
}

message IssueImageUploadUrlRequest {
  // アップロードする画像の MIME（image/png / image/jpeg / image/webp）。
  string content_type = 1;
}

message IssueImageUploadUrlResponse {
  // ブラウザが PUT する先（presigned, 期限付き）。
  string upload_url = 1;
  // 保存・表示に使う恒久 URL（DB にはこちらを保存する）。
  string public_url = 2;
}
