syntax = "proto3";

package momiji.user.shippingaddress.changedefault.v1;

// デフォルト配送先を変更する。 持ち主(user)は JWT から解決する。
service ChangeDefaultShippingAddressService {
  rpc ChangeDefaultShippingAddress(ChangeDefaultShippingAddressRequest) returns (ChangeDefaultShippingAddressResponse);
}

message ChangeDefaultShippingAddressRequest {
  string shipping_address_id = 1;
}

message ChangeDefaultShippingAddressResponse {}
