syntax = "proto3";

package momiji.user.shippingaddress.delete;

// 配送先を削除する。 持ち主(user)は JWT から解決する。
// 削除したのが default で他の配送先が残る場合は、 最古の配送先が自動でデフォルトに昇格する。
service DeleteShippingAddressService {
  rpc DeleteShippingAddress(DeleteShippingAddressRequest) returns (DeleteShippingAddressResponse);
}

message DeleteShippingAddressRequest {
  string shipping_address_id = 1;
}

message DeleteShippingAddressResponse {}
