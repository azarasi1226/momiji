syntax = "proto3";

package momiji.user.shippingaddress.update;

// 登録済みの配送先を編集する。 持ち主(user)は JWT から解決するのでリクエストには含めない。
// default の変更は別ユースケース（changedefault）。
service UpdateShippingAddressService {
  rpc UpdateShippingAddress(UpdateShippingAddressRequest) returns (UpdateShippingAddressResponse);
}

message UpdateShippingAddressRequest {
  string shipping_address_id = 1;
  // 受取人氏名（ユーザー本人とは限らない）
  string name = 2;
  // ドライバー連絡用の電話番号（ハイフン区切り）
  string phone_number = 3;
  string postal_code = 4;
  string prefecture = 5;
  string city = 6;
  // 番地
  string street_address = 7;
  // 建物名・部屋番号（任意）
  string building = 8;
  // 配達メモ（置き配等の配達指示。任意）
  string delivery_note = 9;
}

message UpdateShippingAddressResponse {}
