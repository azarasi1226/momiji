syntax = "proto3";

package momiji.order.findmyorder.v1;

import "google/protobuf/timestamp.proto";
import "momiji/order/v1/status.proto";

// 自分の注文 1 件の詳細。 持ち主(user)は JWT から解決し、 本人の注文でなければ not found。
service FindMyOrderService {
  rpc FindMyOrder(FindMyOrderRequest) returns (FindMyOrderResponse);
}

message FindMyOrderRequest {
  string order_id = 1;
}

message FindMyOrderResponse {
  string order_id = 1;
  momiji.order.v1.OrderStatus status = 2;
  // 注文時点スナップショットの合計金額（単価 × 個数の総和）。
  int64 total_amount = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  // 注文時点スナップショットの配送先（後の住所編集・削除に影響されない）。
  ShippingAddress shipping_address = 6;
  // 使用した保存カード。 未着手（payment_method_id 未設定）や、 後でカード削除された場合は無い。
  optional PaymentMethod payment_method = 7;
  repeated Item items = 8;
}

message ShippingAddress {
  string recipient_name = 1;
  string phone_number = 2;
  string postal_code = 3;
  string prefecture = 4;
  string city = 5;
  string street_address = 6;
  string building = 7;
  string delivery_note = 8;
}

message PaymentMethod {
  string id = 1;
  string brand = 2;
  string last4 = 3;
}

message Item {
  string product_id = 1;
  // 注文時点スナップショットの商品名。
  string name = 2;
  int32 unit_price = 3;
  int32 quantity = 4;
  string image_url = 5;
}
