syntax = "proto3";

package momiji.order;

// 注文のライフサイクル状態。 read model（orders.status）の文字列と 1:1 で対応する（→ domain.order.OrderStatus）。
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  // 注文開始・在庫予約済み（決済未着手）。
  ORDER_STATUS_STARTED = 1;
  // 決済着手済み（PaymentIntent 作成済み・confirm/3DS 待ち）。
  ORDER_STATUS_PAYMENT_PENDING = 2;
  // 決済成功。
  ORDER_STATUS_PAID = 3;
  // 発送済み。
  ORDER_STATUS_SHIPPED = 4;
  // 完了（在庫確定済み）。
  ORDER_STATUS_COMPLETED = 5;
  // 失敗（決済失敗・予約解放済み）。
  ORDER_STATUS_FAILED = 6;
  // キャンセル（ユーザー起点・発送前。 予約解放済み。 課金済みなら返金）。
  ORDER_STATUS_CANCELLED = 7;
}
