services:
  mysql:
    image: mysql:8.0
    container_name: momiji-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: momiji
      MYSQL_USER: momiji
      MYSQL_PASSWORD: momiji
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: momiji-keycloak
    command: start-dev
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  mysql-data: